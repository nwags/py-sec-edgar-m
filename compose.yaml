services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "py_sec_edgar.service_runtime", "api"]
    restart: unless-stopped
    environment:
      PY_SEC_EDGAR_PROJECT_ROOT: /workspace
      PY_SEC_EDGAR_API_HOST: ${PY_SEC_EDGAR_API_HOST:-0.0.0.0}
      PY_SEC_EDGAR_API_PORT: ${PY_SEC_EDGAR_API_PORT:-8000}
      PY_SEC_EDGAR_MONITOR_WARM: ${PY_SEC_EDGAR_MONITOR_WARM:-true}
      PY_SEC_EDGAR_MONITOR_REFRESH_LOOKUP: ${PY_SEC_EDGAR_MONITOR_REFRESH_LOOKUP:-true}
      PY_SEC_EDGAR_MONITOR_FORM_TYPES: ${PY_SEC_EDGAR_MONITOR_FORM_TYPES:-}
      PY_SEC_EDGAR_MONITOR_FORM_FAMILIES: ${PY_SEC_EDGAR_MONITOR_FORM_FAMILIES:-}
      PY_SEC_EDGAR_MONITOR_INTERVAL_SECONDS: ${PY_SEC_EDGAR_MONITOR_INTERVAL_SECONDS:-30}
      PY_SEC_EDGAR_MONITOR_EXECUTE_EXTRACTION: ${PY_SEC_EDGAR_MONITOR_EXECUTE_EXTRACTION:-false}
      PY_SEC_EDGAR_MONITOR_PERSIST_FILING_PARTIES: ${PY_SEC_EDGAR_MONITOR_PERSIST_FILING_PARTIES:-false}
      PY_SEC_EDGAR_MONITOR_SINGLE_INSTANCE: ${PY_SEC_EDGAR_MONITOR_SINGLE_INSTANCE:-true}
    ports:
      - "${PY_SEC_EDGAR_API_PORT:-8000}:${PY_SEC_EDGAR_API_PORT:-8000}"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import os,urllib.request;port=os.getenv("PY_SEC_EDGAR_API_PORT","8000");urllib.request.urlopen(f"http://127.0.0.1:{port}/health",timeout=5).read()
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - ${PY_SEC_EDGAR_HOST_DATA_ROOT:-.}:/workspace

  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "py_sec_edgar.service_runtime", "monitor-loop"]
    restart: unless-stopped
    environment:
      PY_SEC_EDGAR_PROJECT_ROOT: /workspace
      PY_SEC_EDGAR_MONITOR_INTERVAL_SECONDS: ${PY_SEC_EDGAR_MONITOR_INTERVAL_SECONDS:-30}
      PY_SEC_EDGAR_MONITOR_WARM: ${PY_SEC_EDGAR_MONITOR_WARM:-true}
      PY_SEC_EDGAR_MONITOR_REFRESH_LOOKUP: ${PY_SEC_EDGAR_MONITOR_REFRESH_LOOKUP:-true}
      PY_SEC_EDGAR_MONITOR_FORM_TYPES: ${PY_SEC_EDGAR_MONITOR_FORM_TYPES:-}
      PY_SEC_EDGAR_MONITOR_FORM_FAMILIES: ${PY_SEC_EDGAR_MONITOR_FORM_FAMILIES:-}
      PY_SEC_EDGAR_MONITOR_EXECUTE_EXTRACTION: ${PY_SEC_EDGAR_MONITOR_EXECUTE_EXTRACTION:-false}
      PY_SEC_EDGAR_MONITOR_PERSIST_FILING_PARTIES: ${PY_SEC_EDGAR_MONITOR_PERSIST_FILING_PARTIES:-false}
      PY_SEC_EDGAR_MONITOR_SINGLE_INSTANCE: ${PY_SEC_EDGAR_MONITOR_SINGLE_INSTANCE:-true}
    volumes:
      - ${PY_SEC_EDGAR_HOST_DATA_ROOT:-.}:/workspace
